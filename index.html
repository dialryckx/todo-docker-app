<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List (Python + MongoDB)</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; background: #f4f4f9; }
        h1 { text-align: center; color: #333; }
        .todo-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
        ul { list-style: none; padding: 0; }
        li { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        li.completed span { text-decoration: line-through; color: #888; }
        .delete-btn { background: #dc3545; padding: 5px 10px; font-size: 12px; }
        .delete-btn:hover { background: #c82333; }
    </style>
</head>
<body>

<div class="todo-container">
    <h1>My Tasks</h1>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="What needs to be done?">
        <button onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script>
    const API_URL = '/todos';

    document.addEventListener('DOMContentLoaded', fetchTasks);

    async function fetchTasks() {
        const response = await fetch(API_URL);
        const tasks = await response.json();
        const taskList = document.getElementById('taskList');
        taskList.innerHTML = '';
        
        tasks.forEach(task => {
            renderTask(task);
        });
    }

    async function addTask() {
        const input = document.getElementById('taskInput');
        const title = input.value.trim();
        if (!title) return;

        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: title, completed: false })
        });

        const newTask = await response.json();
        renderTask(newTask);
        input.value = '';
    }

    async function toggleTask(id, currentTitle, currentStatus) {
        await fetch(`${API_URL}/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: currentTitle, completed: !currentStatus })
        });
        fetchTasks(); 
    }

    async function deleteTask(id) {
        await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        fetchTasks(); 
    }

    function renderTask(task) {
        const li = document.createElement('li');
        if (task.completed) li.classList.add('completed');

        li.innerHTML = `
            <div>
                <input type="checkbox" ${task.completed ? 'checked' : ''} 
                       onchange="toggleTask('${task.id}', '${task.title}', ${task.completed})">
                <span>${task.title}</span>
            </div>
            <button class="delete-btn" onclick="deleteTask('${task.id}')">Delete</button>
        `;
        document.getElementById('taskList').appendChild(li);
    }
</script>

</body>
</html>
